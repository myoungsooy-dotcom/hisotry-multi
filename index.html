<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영토 전쟁: 히스토리 에이지 멀티</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --main: #bc4749; --sub: #386641; --bg: #f2e8cf; --gold: #f2cc8f; 
            --white: #fffefb; --dark: #2b2d42;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'AppleMyungjo', 'Songti SC', serif; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #game-container { 
            width: 100%; max-width: 450px; background: var(--white); 
            border: 8px double var(--main); display: flex; flex-direction: column; position: relative; 
        }
        
        /* 헤더 UI */
        .header { padding: 15px; border-bottom: 2px solid var(--main); background: rgba(188, 71, 73, 0.05); }
        .hp-bar { width: 100%; height: 15px; background: #ddd; border-radius: 10px; overflow: hidden; border: 1px solid #999; margin: 5px 0; }
        .hp-fill { height: 100%; width: 100%; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #my-hp-bar { background: var(--sub); }
        #peer-hp-bar { background: var(--main); }
        .hp-label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; color: var(--dark); }

        /* 메인 피드 */
        #feed { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        #tag { background: var(--gold); padding: 4px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; border: 1px solid #d4a373; font-size: 0.9rem; }
        #question { font-size: 1.25rem; line-height: 1.6; color: var(--dark); word-break: keep-all; font-weight: 700; }

        /* 하단 버튼 */
        #btns { padding: 15px; display: grid; gap: 12px; background: #f8f4e9; border-top: 1px solid #ddd; }
        .btn { 
            padding: 16px; border: 2px solid #ccc; background: #fff; border-radius: 10px; 
            font-size: 1.05rem; text-align: left; cursor: pointer; transition: 0.2s;
            box-shadow: 0 3px 0 #ccc;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #ccc; }
        .correct { background: #d8f3dc !important; border-color: #52b788 !important; color: #1b4332 !important; font-weight: bold; }
        .wrong { background: #ffdada !important; border-color: #e07a5f !important; color: #782a2b !important; font-weight: bold; }

        /* 오버레이 (대기실) */
        .overlay { position: absolute; inset: 0; background: var(--main); color: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .overlay h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .input-group { margin: 25px 0; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        input { padding: 15px; border-radius: 10px; border: none; text-align: center; font-size: 1.2rem; color: var(--dark); }
        .main-btn { padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; color: #5e4419; }
        
        /* 피격 효과 */
        .hit-shake { animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby" class="overlay">
        <h1>영토 전쟁</h1>
        <p>나의 대결 코드</p>
        <h2 id="my-id" style="background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 5px; letter-spacing: 2px;">연결 중...</h2>
        <div class="input-group">
            <input type="text" id="peer-id-input" placeholder="친구 코드 입력" maxlength="5">
            <button class="main-btn" onclick="connectToPeer()">친구에게 도전하기</button>
        </div>
        <p style="font-size: 0.85rem; opacity: 0.9; line-height: 1.5;">내 코드를 친구에게 알려주거나,<br>친구가 만든 코드를 입력해 입장하세요.</p>
    </div>

    <div class="header">
        <div class="hp-label"><span>청룡 (나)</span><span id="my-hp-val">100</span></div>
        <div class="hp-bar"><div id="my-hp-bar" class="hp-fill"></div></div>
        <div class="hp-label" style="margin-top:12px;"><span>주작 (상대)</span><span id="peer-hp-val">100</span></div>
        <div class="hp-bar"><div id="peer-hp-bar" class="hp-fill"></div></div>
    </div>

    <div id="feed">
        <div id="tag">시대 로딩</div>
        <div id="question">상대방의 연결을 기다리고 있습니다...</div>
    </div>

    <div id="btns">
        <button class="btn" onclick="submitAnswer(0)">1. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(1)">2. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(2)">3. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(3)">4. <span class="tx">-</span></button>
    </div>
</div>

<script>
    /** * 시대별 10문제 이상 - 총 50문항 DB 
     */
    const db = [
        // 1. 선사 및 고대 (10문제)
        {e:"선사", q:"떼석기를 사용하고 동굴이나 막집에 거주한 시대는?", c:["구석기","신석기","청동기","철기"], a:0},
        {e:"선사", q:"가락바퀴와 뼈바늘을 이용해 옷을 지어 입기 시작한 시대는?", c:["구석기","신석기","청동기","철기"], a:1},
        {e:"선사", q:"비파형 동검과 고인돌이 처음 등장한 계급 사회는?", c:["구석기","신석기","청동기","철기"], a:2},
        {e:"고조선", q:"사회 질서를 유지하기 위해 만든 '범금 8조'가 있었던 나라는?", c:["부여", "고구려", "고조선", "옥저"], a:2},
        {e:"고구려", q:"서옥제라는 혼인 풍습과 부경이라는 창고가 있었던 나라는?", c:["부여", "옥저", "동예", "고구려"], a:3},
        {e:"부여", q:"마가, 우가, 저가, 구가가 사출도를 다스렸던 나라는?", c:["부여", "삼한", "고구려", "옥저"], a:0},
        {e:"삼한", q:"천군이 다스리는 신성 지역인 '소도'가 존재했던 나라는?", c:["옥저", "동예", "부여", "삼한"], a:3},
        {e:"백제", q:"요서 지방으로 진출하고 평양성을 공격한 백제의 전성기 왕은?", c:["성왕", "무령왕", "근초고왕", "개로왕"], a:2},
        {e:"고구려", q:"신라에 침입한 왜를 격퇴하고 호우명 그릇을 남긴 왕은?", c:["소수림왕", "광개토대왕", "장수왕", "문자명왕"], a:1},
        {e:"신라", q:"화랑도를 개편하고 한강 유역을 차지하여 단양 적성비를 세운 왕은?", c:["지증왕", "법흥왕", "진흥왕", "내물왕"], a:2},

        // 2. 남북국 및 고려 (10문제)
        {e:"발해", q:"고구려 유민 대조영이 동모산에서 건국한 나라는?", c:["부여", "옥저", "발해", "신라"], a:2},
        {e:"통일신라", q:"국학을 설립하고 관료전을 지급하며 왕권을 강화한 왕은?", c:["무열왕", "문무왕", "신문왕", "경덕왕"], a:2},
        {e:"고려", q:"호족 세력을 견제하기 위해 과거제를 처음 실시한 왕은?", c:["태조", "광종", "성종", "공민왕"], a:1},
        {e:"고려", q:"최충헌이 설치한 최고 집권 기구로 인사와 정치를 장악한 곳은?", c:["도병마사", "정방", "교정도감", "식목도감"], a:2},
        {e:"고려", q:"몽골의 침략에 맞서 강화도로 도읍을 옮겨 항전한 부대는?", c:["별무반", "삼별초", "신의군", "야별초"], a:1},
        {e:"고려", q:"시무 28조를 수용하여 유교 통치 체제를 정비한 왕은?", c:["광종", "성종", "현종", "문종"], a:1},
        {e:"고려", q:"쌍성총관부를 공격하여 영토를 회복하고 변발을 금지한 왕은?", c:["충렬왕", "충선왕", "공민왕", "우왕"], a:2},
        {e:"고려", q:"국제 무역항으로 아라비아 상인들에게 알려진 항구는?", c:["울산항", "당항성", "청해진", "벽란도"], a:3},
        {e:"고려", q:"교종 중심으로 선종을 통합하기 위해 교관겸수를 주장한 승려는?", c:["지눌", "의천", "원효", "의상"], a:1},
        {e:"고려", q:"금국 정벌과 서경 천도를 주장하며 난을 일으킨 승려는?", c:["묘청", "김부식", "최충", "의천"], a:0},

        // 3. 조선 전기 및 중기 (10문제)
        {e:"조선", q:"6조 직계제를 실시하고 호패법을 시행하여 왕권을 강화한 왕은?", c:["태조", "태종", "세종", "세조"], a:1},
        {e:"조선", q:"의정부 서사제를 실시하고 훈민정음을 창제한 왕은?", c:["세종", "성종", "중종", "정조"], a:0},
        {e:"조선", q:"조선의 기본 법전인 '경국대전'을 완성하여 반포한 왕은?", c:["세종", "세조", "성종", "연산군"], a:2},
        {e:"조선", q:"조광조를 등용하여 현량과를 실시하고 개혁을 시도한 왕은?", c:["중종", "명종", "선조", "숙종"], a:0},
        {e:"조선", q:"임진왜란 중 행주대첩을 승리로 이끈 장군은?", c:["이순신", "권율", "김시민", "곽재우"], a:1},
        {e:"조선", q:"왜란 중 바다에서 학익진 전법으로 일본 수군을 격파한 곳은?", c:["명량", "노량", "한산도", "옥포"], a:2},
        {e:"조선", q:"광해군 때 처음 실시된 제도로, 특산물 대신 쌀을 거둔 법은?", c:["영정법", "대동법", "균역법", "호포제"], a:1},
        {e:"조선", q:"청의 요청으로 조총 부대를 보내 러시아를 정벌한 사건은?", c:["기유약조", "나선정벌", "이괄의 난", "병자호란"], a:1},
        {e:"조선", q:"인조가 남한산성에서 항전하다가 청에 항복한 전쟁은?", c:["정묘호란", "병자호란", "임진왜란", "정유재란"], a:1},
        {e:"조선", q:"숙종 때 서인과 남인이 번갈아 집권하며 정국이 급변한 현상은?", c:["탕평", "사화", "환국", "붕당"], a:2},

        // 4. 조선 후기 및 개항기 (10문제)
        {e:"조선", q:"수원 화성을 건설하고 장용영을 설치한 개혁 군주는?", c:["영조", "정조", "순조", "철종"], a:1},
        {e:"조선", q:"붕당의 대립을 막기 위해 탕평비를 세우고 서원을 정리한 왕은?", c:["숙종", "영조", "정조", "고종"], a:1},
        {e:"조선", q:"조선 후기 실학자로 '목민심서'와 '경세유표'를 저술한 인물은?", c:["박지원", "박제가", "정약용", "이익"], a:2},
        {e:"조선", q:"정조 때 설치된 왕실 도서관이자 정책 연구 기관은?", c:["집현전", "홍문관", "규장각", "승정원"], a:2},
        {e:"개항기", q:"흥선대원군이 왕권 강화를 위해 중건한 조선의 법궁은?", c:["창덕궁", "경복궁", "창경궁", "덕수궁"], a:1},
        {e:"개항기", q:"1876년 조선이 외국과 맺은 최초의 근대적 불평등 조약은?", c:["제물포 조약", "강화도 조약", "한성 조약", "조미 수호 통상 조약"], a:1},
        {e:"개항기", q:"김옥균 등이 근대 국가 건설을 목표로 일으킨 정변은?", c:["임오군란", "갑신정변", "을미사변", "아관파천"], a:1},
        {e:"개항기", q:"전주 화약을 체결하고 집강소를 설치하여 개혁을 추진한 운동은?", c:["위정척사", "독립협회", "동학 농민 운동", "보안회"], a:2},
        {e:"대한제국", q:"고종이 황제 즉위식을 거행하고 선포한 국호는?", c:["대한민국", "조선공화국", "대한제국", "고려국"], a:2},
        {e:"개항기", q:"일본의 경제 침탈에 맞서 '나랏빚을 갚자'며 일어난 운동은?", c:["물산장려운동", "국채보상운동", "형평운동", "브나로드"], a:1},

        // 5. 일제강점기 및 현대 (12문제)
        {e:"일제강점기", q:"1919년 고종의 인산일을 계기로 일어난 최대 민족 운동은?", c:["6.10 만세", "광주학생운동", "3.1 운동", "신간회"], a:2},
        {e:"일제강점기", q:"대한민국 임시 정부의 활동 지침인 '조선 혁명 선언'을 쓴 인물은?", c:["김구", "신채호", "안창호", "이회영"], a:1},
        {e:"일제강점기", q:"김원봉이 조직하여 파괴와 암살 활동을 펼친 단체는?", c:["의열단", "한인 애국단", "한국 광복군", "조선 의용대"], a:0},
        {e:"일제강점기", q:"김구가 조직하여 이봉창, 윤봉길 등이 활동한 단체는?", c:["의열단", "한인 애국단", "신간회", "독립군"], a:1},
        {e:"일제강점기", q:"민족주의 세력과 사회주의 세력이 연합한 최대 규모 항일 단체는?", c:["신민회", "보안회", "신간회", "근우회"], a:2},
        {e:"일제강점기", q:"홍범도 부대가 일본군을 크게 격파한 전투는?", c:["봉오동 전투", "청산리 대첩", "간도 참변", "자유시 참변"], a:0},
        {e:"일제강점기", q:"일제가 1930년대 이후 우리 민족의 정신을 말살하려 한 정책은?", c:["토지조사사업", "산미증식계획", "민족말살통치", "무단통치"], a:2},
        {e:"현대", q:"1960년 3.15 부정 선거에 항거하여 일어난 민주화 운동은?", c:["4.19 혁명", "5.18 민주화 운동", "6월 민주 항쟁", "부마 항쟁"], a:0},
        {e:"현대", q:"1980년 신군부의 비상계엄 확대에 맞서 광주에서 일어난 운동은?", c:["4.19 혁명", "5.18 민주화 운동", "6월 민주 항쟁", "10.26 사태"], a:1},
        {e:"현대", q:"1987년 대통령 직선제 개헌을 이끌어낸 민주화 운동은?", c:["4.19 혁명", "5.18 민주화 운동", "6월 민주 항쟁", "제주 4.3 사건"], a:2},
        {e:"현대", q:"남북한이 동시에 UN에 가입하고 남북 기본 합의서를 채택한 정부는?", c:["박정희 정부", "전두환 정부", "노태우 정부", "김영삼 정부"], a:2},
        {e:"현대", q:"최초의 남북 정상 회담을 개최하고 6.15 공동 선언을 발표한 정부는?", c:["노태우 정부", "김영삼 정부", "김대중 정부", "노무현 정부"], a:2}
    ];

    // 게임 변수
    let peer = new Peer(generateShortId()); // 5자리 랜덤 코드 생성
    let conn;
    let myHp = 100, peerHp = 100, curIdx = 0, lock = true;
    const container = document.getElementById('game-container');

    function generateShortId() {
        return Math.random().toString(36).substring(2, 7).toUpperCase();
    }

    // 내 ID 표시
    peer.on('open', id => { document.getElementById('my-id').innerText = id; });

    // 상대방이 나에게 연결을 시도할 때
    peer.on('connection', c => {
        if (conn) return; // 이미 연결된 경우 방지
        conn = c;
        setupCommunication();
        document.getElementById('lobby').style.display = 'none';
        startGame();
    });

    // 내가 상대방에게 연결할 때
    function connectToPeer() {
        const peerId = document.getElementById('peer-id-input').value.toUpperCase();
        if(!peerId) return alert("상대 코드를 입력하세요.");
        conn = peer.connect(peerId);
        setupCommunication();
        document.getElementById('lobby').style.display = 'none';
        startGame();
    }

    function setupCommunication() {
        conn.on('data', data => {
            if(data.type === 'hit') {
                myHp -= data.damage;
                vibrateMobile(200); // 피격 진동
                showHitEffect();
                updateUI();
            } else if(data.type === 'next') {
                curIdx = data.idx;
                renderQuest();
            }
        });
        conn.on('close', () => { alert("상대방의 연결이 끊겼습니다."); location.reload(); });
    }

    function startGame() {
        // ID가 더 작은 플레이어가 문제를 출제 (동기화 용도)
        if(peer.id < conn.peer) {
            pickNextQuestion();
        }
    }

    function pickNextQuestion() {
        curIdx = Math.floor(Math.random() * db.length);
        conn.send({type: 'next', idx: curIdx});
        renderQuest();
    }

    function renderQuest() {
        lock = false;
        const q = db[curIdx];
        document.getElementById('tag').innerText = q.e;
        document.getElementById('question').innerText = q.q;
        const btns = document.querySelectorAll('.btn');
        btns.forEach((b, i) => {
            b.className = 'btn';
            b.querySelector('.tx').innerText = q.c[i];
        });
    }

    function submitAnswer(idx) {
        if(lock) return;
        lock = true;
        const q = db[curIdx];
        const btns = document.querySelectorAll('.btn');

        if(idx === q.a) {
            btns[idx].classList.add('correct');
            peerHp -= 10;
            conn.send({type: 'hit', damage: 10});
        } else {
            btns[idx].classList.add('wrong');
            btns[q.a].classList.add('correct');
            myHp -= 10;
            vibrateMobile(100); 
            showHitEffect();
        }
        updateUI();
        
        setTimeout(() => {
            if(myHp <= 0 || peerHp <= 0) {
                alert(myHp <= 0 ? "패배! 영토를 잃었습니다." : "승리! 천하를 통일했습니다.");
                location.reload();
            } else {
                if(peer.id < conn.peer) pickNextQuestion();
            }
        }, 1200);
    }

    function updateUI() {
        document.getElementById('my-hp-bar').style.width = myHp + "%";
        document.getElementById('peer-hp-bar').style.width = peerHp + "%";
        document.getElementById('my-hp-val').innerText = myHp;
        document.getElementById('peer-hp-val').innerText = peerHp;
    }

    function showHitEffect() {
        container.classList.add('hit-shake');
        setTimeout(() => container.classList.remove('hit-shake'), 300);
    }

    function vibrateMobile(ms) {
        if (navigator.vibrate) navigator.vibrate(ms);
    }
</script>
</body>
</html>
