<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영토 전쟁: 히스토리 에이지 멀티</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --main: #bc4749; --sub: #386641; --bg: #f2e8cf; --gold: #f2cc8f; --white: #fffefb; --dark: #2b2d42; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'AppleMyungjo', serif; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { width: 100%; max-width: 450px; background: var(--white); border: 8px double var(--main); display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; border-bottom: 2px solid var(--main); background: rgba(188, 71, 73, 0.05); }
        .hp-bar { width: 100%; height: 15px; background: #ddd; border-radius: 10px; overflow: hidden; border: 1px solid #999; margin: 5px 0; }
        .hp-fill { height: 100%; width: 100%; transition: 0.4s; }
        #my-hp-bar { background: var(--sub); }
        #peer-hp-bar { background: var(--main); }
        .hp-label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }
        #feed { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        #tag { background: var(--gold); padding: 4px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; border: 1px solid #d4a373; }
        #question { font-size: 1.2rem; line-height: 1.6; color: var(--dark); font-weight: 700; word-break: keep-all; }
        #btns { padding: 15px; display: grid; gap: 12px; background: #f8f4e9; }
        .btn { padding: 16px; border: 2px solid #ccc; background: #fff; border-radius: 10px; font-size: 1.05rem; text-align: left; cursor: pointer; }
        .correct { background: #d8f3dc !important; border-color: #52b788 !important; }
        .wrong { background: #ffdada !important; border-color: #e07a5f !important; }
        .overlay { position: absolute; inset: 0; background: var(--main); color: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { padding: 15px; border-radius: 10px; border: none; text-align: center; font-size: 1.2rem; width: 100%; margin-bottom: 10px; color: #333; }
        .main-btn { padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; color: #5e4419; font-size: 1.1rem; }
        .hit-shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby" class="overlay">
        <h1>영토 전쟁</h1>
        <p>함께 입장할 방 이름을 입력하세요</p>
        <div style="width:100%; margin: 20px 0;">
            <input type="text" id="room-input" placeholder="예: 1234" maxlength="10">
            <button class="main-btn" id="join-btn" onclick="joinRoom()">전투 입장</button>
        </div>
        <p id="lobby-status" style="font-size:0.8rem; opacity:0.8;">방 이름을 맞추면 자동으로 대결이 시작됩니다.</p>
    </div>

    <div class="header">
        <div class="hp-label"><span>나 (청룡)</span><span id="my-hp-val">100</span></div>
        <div class="hp-bar"><div id="my-hp-bar" class="hp-fill"></div></div>
        <div class="hp-label" style="margin-top:10px;"><span>상대 (주작)</span><span id="peer-hp-val">100</span></div>
        <div class="hp-bar"><div id="peer-hp-bar" class="hp-fill"></div></div>
    </div>

    <div id="feed">
        <div id="tag">시대</div>
        <div id="question">상대를 기다리는 중...</div>
    </div>

    <div id="btns">
        <button class="btn" onclick="submitAnswer(0)">1. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(1)">2. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(2)">3. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(3)">4. <span class="tx">-</span></button>
    </div>
</div>

<script>
    // 서버 연결 초기화
    const socket = io(); 
    let currentRoom = "";
    let myHp = 100, peerHp = 100, curIdx = 0, lock = true;

    // 문제 데이터 DB (전체 50문항)
    const db = [
        {e:"선사", q:"떼석기를 사용하고 동굴이나 막집에 거주한 시대는?", c:["구석기","신석기","청동기","철기"], a:0},
        {e:"선사", q:"가락바퀴와 뼈바늘로 옷을 지어 입기 시작한 시대는?", c:["구석기","신석기","청동기","철기"], a:1},
        {e:"선사", q:"비파형 동검과 고인돌이 등장한 계급 사회는?", c:["구석기","신석기","청동기","철기"], a:2},
        {e:"고조선", q:"사회 질서를 위해 만든 '범금 8조'가 있던 나라는?", c:["부여","고구려","고조선","옥저"], a:2},
        {e:"부여", q:"마가, 우가, 저가, 구가가 사출도를 다스린 나라는?", c:["부여","삼한","고구려","옥저"], a:0},
        {e:"고구려", q:"서옥제 풍습과 '부경'이라는 창고가 있던 나라는?", c:["부여","옥저","동예","고구려"], a:3},
        {e:"삼한", q:"천군이 다스리는 신성 지역 '소도'가 존재한 나라는?", c:["옥저","동예","부여","삼한"], a:3},
        {e:"백제", q:"요서로 진출하고 평양성을 공격한 전성기 왕은?", c:["성왕","무령왕","근초고왕","개로왕"], a:2},
        {e:"고구려", q:"신라에 침입한 왜를 격퇴하고 호우명 그릇을 남긴 왕은?", c:["소수림왕","광개토대왕","장수왕","문자명왕"], a:1},
        {e:"신라", q:"화랑도를 개편하고 한강을 차지해 적성비를 세운 왕은?", c:["지증왕","법흥왕","진흥왕","내물왕"], a:2},
        {e:"고려", q:"호족 견제를 위해 과거제를 처음 실시한 왕은?", c:["태조","광종","성종","공민왕"], a:1},
        {e:"고려", q:"시무 28조를 수용해 유교 통치 체제를 정비한 왕은?", c:["광종","성종","현종","문종"], a:1},
        {e:"고려", q:"최충헌이 설치한 최고 집권 기구는?", c:["도병마사","정방","교정도감","식목도감"], a:2},
        {e:"고려", q:"몽골 침략에 맞서 강화도에서 항전한 부대는?", c:["별무반","삼별초","신의군","야별초"], a:1},
        {e:"고려", q:"쌍성총관부를 공격해 영토를 회복한 왕은?", c:["충렬왕","충선왕","공민왕","우왕"], a:2},
        {e:"고려", q:"국제 무역항으로 아라비아 상인들이 드나든 곳은?", c:["울산항","당항성","청해진","벽란도"], a:3},
        {e:"고려", q:"교종 중심으로 선종을 통합하려 한 승려는?", c:["지눌","의천","원효","의상"], a:1},
        {e:"고려", q:"금 정벌과 서경 천도를 주장하며 난을 일으킨 승려는?", c:["묘청","김부식","최충","의천"], a:0},
        {e:"고려", q:"목화씨를 가져와 의생활 혁명을 가져온 인물은?", c:["문익점","최무선","지눌","의천"], a:0},
        {e:"고려", q:"화통도감을 설치해 왜구를 격퇴한 인물은?", c:["최영","최무선","이성계","임난수"], a:1},
        {e:"조선", q:"6조 직계제를 실시하고 호패법을 시행한 왕은?", c:["태조","태종","세종","세조"], a:1},
        {e:"조선", q:"의정부 서사제를 실시하고 훈민정음을 창제한 왕은?", c:["세종","성종","중종","정조"], a:0},
        {e:"조선", q:"기본 법전인 '경국대전'을 완성해 반포한 왕은?", c:["세종","세조","성종","연산군"], a:2},
        {e:"조선", q:"행주대첩을 승리로 이끈 장군은?", c:["이순신","권율","김시민","곽재우"], a:1},
        {e:"조선", q:"학익진 전법으로 일본 수군을 대파한 곳은?", c:["명량","노량","한산도","옥포"], a:2},
        {e:"조선", q:"특산물 대신 쌀을 거두는 '대동법'이 처음 실시된 왕은?", c:["선조","광해군","인조","효종"], a:1},
        {e:"조선", q:"병자호란 때 인조가 피신해 항전한 곳은?", c:["강화도","북한산성","남한산성","행주산성"], a:2},
        {e:"조선", q:"현직 관리에게만 수조권을 준 '직전법'을 실시한 왕은?", c:["태종","세종","세조","성종"], a:2},
        {e:"조선", q:"조광조가 주장한 관리 추천 제도인 '현량과'가 실시된 왕은?", c:["중종","명종","선조","광해군"], a:0},
        {e:"조선", q:"임진왜란 중 곽재우, 고경명 등이 자발적으로 조직한 군대는?", c:["훈련도감","의병","별기군","삼별초"], a:1},
        {e:"조선 후기", q:"수원 화성을 건설하고 장용영을 설치한 왕은?", c:["영조","정조","순조","철종"], a:1},
        {e:"조선 후기", q:"탕평비를 세우고 서원을 정리한 왕은?", c:["숙종","영조","정조","고종"], a:1},
        {e:"조선 후기", q:"'목민심서'를 저술한 대표적 실학자는?", c:["박지원","박제가","정약용","이익"], a:2},
        {e:"개항기", q:"흥선대원군이 왕권 강화를 위해 중건한 궁궐은?", c:["창덕궁","경복궁","창경궁","덕수궁"], a:1},
        {e:"개항기", q:"1876년 체결된 최초의 근대적 불평등 조약은?", c:["강화도 조약","제물포 조약","한성 조약","텐진 조약"], a:0},
        {e:"개항기", q:"김옥균 등이 근대 국가 건설을 위해 일으킨 정변은?", c:["임오군란","갑신정변","을미사변","아관파천"], a:1},
        {e:"개항기", q:"집강소를 설치해 개혁을 추진한 민중 운동은?", c:["위정척사","독립협회","동학 농민 운동","보안회"], a:2},
        {e:"대한제국", q:"고종이 황제 즉위식을 거행하고 선포한 국호는?", c:["대한민국","조선공화국","대한제국","고려국"], a:2},
        {e:"개항기", q:"일본의 경제 침탈에 맞선 '나랏빚 갚기' 운동은?", c:["물산장려운동","국채보상운동","형평운동","브나로드"], a:1},
        {e:"대한제국", q:"광무개혁의 원칙으로 옛것을 근본 삼고 새것을 참작함은?", c:["동도서기","화혼양재","구본신참","중체서용"], a:2},
        {e:"일제강점기", q:"1919년 고종의 인산일을 계기로 일어난 민족 운동은?", c:["6.10 만세","광주학생운동","3.1 운동","신간회"], a:2},
        {e:"일제강점기", q:"김원봉이 조직해 파괴와 암살을 펼친 단체는?", c:["의열단","한인 애국단","한국 광복군","조선 의용대"], a:0},
        {e:"일제강점기", q:"민족주의와 사회주의 세력이 연합한 최대 단체는?", c:["신민회","보안회","신간회","근우회"], a:2},
        {e:"일제강점기", q:"홍범도 부대가 일본군을 대파한 전투는?", c:["봉오동 전투","청산리 대첩","간도 참변","자유시 참변"], a:0},
        {e:"일제강점기", q:"임시 정부의 군대로 대일 선전 포고를 한 군대는?", c:["대한독립군","의열단","한국 광복군","조선의용군"], a:2},
        {e:"일제강점기", q:"일제가 1910년대 실시한 토지 조사 사업의 방식은?", c:["신고주의","매수주의","국유화","공동소유"], a:0},
        {e:"현대", q:"1960년 3.15 부정 선거에 항거한 민주화 운동은?", c:["4.19 혁명","5.18 민주화 운동","6월 민주 항쟁","부마 항쟁"], a:0},
        {e:"현대", q:"1980년 광주에서 일어난 민주화 운동은?", c:["4.19 혁명","5.18 민주화 운동","6월 민주 항쟁","10.26 사태"], a:1},
        {e:"현대", q:"1987년 직선제 개헌을 이끌어낸 민주화 운동은?", c:["4.19 혁명","5.18 민주화 운동","6월 민주 항쟁","제주 4.3"], a:2},
        {e:"현대", q:"최초의 남북 정상 회담과 6.15 선언이 발표된 정부는?", c:["노태우","김영삼","김대중","노무현"], a:2}
    ];

    function joinRoom() {
        const roomInput = document.getElementById('room-input');
        const room = roomInput.value.trim();
        if(!room) return alert("방 이름을 입력하세요.");
        
        currentRoom = room;
        // 서버에 방 참가 신호를 보냅니다.
        socket.emit('join-room', room);
        
        document.getElementById('lobby-status').innerText = "서버 연결 시도 중...";
        document.getElementById('join-btn').disabled = true;
    }

    // 서버 신호: 게임 시작 (두 명 모임)
    socket.on('game-start', () => {
        document.getElementById('lobby').style.display = 'none';
        // 방에 먼저 들어온 사람이 문제를 출제하도록 타이밍 조절
        setTimeout(pickQ, 500); 
    });

    // 상대방 데이터 수신
    socket.on('peer-data', (data) => {
        if(data.type === 'next') {
            curIdx = data.idx;
            renderQ();
        } else if(data.type === 'hit') {
            myHp -= data.dmg;
            showHit();
            updateUI();
        }
    });

    function pickQ() {
        curIdx = Math.floor(Math.random() * db.length);
        renderQ();
        // 내 화면의 인덱스를 상대에게 복제함
        socket.emit('game-data', { roomId: currentRoom, type: 'next', idx: curIdx });
    }

    function renderQ() {
        lock = false;
        const q = db[curIdx];
        document.getElementById('tag').innerText = q.e;
        document.getElementById('question').innerText = q.q;
        document.querySelectorAll('.btn').forEach((b, i) => {
            b.className = 'btn';
            b.querySelector('.tx').innerText = q.c[i];
        });
    }

    function submitAnswer(idx) {
        if(lock) return;
        lock = true;
        const q = db[curIdx];
        const btns = document.querySelectorAll('.btn');

        if(idx === q.a) {
            btns[idx].classList.add('correct');
            peerHp -= 10;
            socket.emit('game-data', { roomId: currentRoom, type: 'hit', dmg: 10 });
        } else {
            btns[idx].classList.add('wrong');
            btns[q.a].classList.add('correct');
            myHp -= 10;
            showHit();
        }
        updateUI();

        setTimeout(() => {
            if(myHp <= 0 || peerHp <= 0) {
                alert(myHp <= 0 ? "패배!" : "승리!");
                location.reload();
            } else {
                // 문제를 맞춘 사람이 다음 문제 권한을 가짐
                if(idx === q.a) pickQ();
            }
        }, 1200);
    }

    function updateUI() {
        document.getElementById('my-hp-bar').style.width = myHp + "%";
        document.getElementById('peer-hp-bar').style.width = peerHp + "%";
        document.getElementById('my-hp-val').innerText = myHp;
        document.getElementById('peer-hp-val').innerText = peerHp;
    }

    function showHit() {
        document.getElementById('game-container').classList.add('hit-shake');
        setTimeout(() => document.getElementById('game-container').classList.remove('hit-shake'), 300);
    }
</script>
</body>
</html>
