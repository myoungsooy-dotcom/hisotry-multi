<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영토 전쟁: 히스토리 에이지 멀티</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --main: #bc4749; --sub: #386641; --bg: #f2e8cf; --gold: #f2cc8f; --white: #fffefb; --dark: #2b2d42; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'AppleMyungjo', serif; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { width: 100%; max-width: 450px; background: var(--white); border: 8px double var(--main); display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; border-bottom: 2px solid var(--main); background: rgba(188, 71, 73, 0.05); }
        .hp-bar { width: 100%; height: 15px; background: #ddd; border-radius: 10px; overflow: hidden; border: 1px solid #999; margin: 5px 0; }
        .hp-fill { height: 100%; width: 100%; transition: 0.4s; }
        #my-hp-bar { background: var(--sub); }
        #peer-hp-bar { background: var(--main); }
        .hp-label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }
        #feed { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        #tag { background: var(--gold); padding: 4px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; border: 1px solid #d4a373; }
        #question { font-size: 1.2rem; line-height: 1.6; color: var(--dark); font-weight: 700; word-break: keep-all; }
        #btns { padding: 15px; display: grid; gap: 12px; background: #f8f4e9; }
        .btn { padding: 16px; border: 2px solid #ccc; background: #fff; border-radius: 10px; font-size: 1.05rem; text-align: left; cursor: pointer; }
        .correct { background: #d8f3dc !important; border-color: #52b788 !important; }
        .wrong { background: #ffdada !important; border-color: #e07a5f !important; }
        .overlay { position: absolute; inset: 0; background: var(--main); color: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { padding: 15px; border-radius: 10px; border: none; text-align: center; font-size: 1.2rem; width: 100%; margin-bottom: 10px; color: #333; }
        .main-btn { padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; color: #5e4419; font-size: 1.1rem; }
        .hit-shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby" class="overlay">
        <h1>영토 전쟁</h1>
        <p>함께 입장할 방 이름을 입력하세요</p>
        <div style="width:100%; margin: 20px 0;">
            <input type="text" id="room-input" placeholder="예: 1234" maxlength="10">
            <button class="main-btn" id="join-btn" onclick="joinRoom()">전투 입장</button>
        </div>
        <p id="lobby-status" style="font-size:0.8rem; opacity:0.8;">상대방과 같은 방 이름을 입력하세요.</p>
    </div>

    <div class="header">
        <div class="hp-label"><span>나 (청룡)</span><span id="my-hp-val">100</span></div>
        <div class="hp-bar"><div id="my-hp-bar" class="hp-fill"></div></div>
        <div class="hp-label" style="margin-top:10px;"><span>상대 (주작)</span><span id="peer-hp-val">100</span></div>
        <div class="hp-bar"><div id="peer-hp-bar" class="hp-fill"></div></div>
    </div>

    <div id="feed">
        <div id="tag">시대</div>
        <div id="question">준비 중...</div>
    </div>

    <div id="btns">
        <button class="btn" onclick="submitAnswer(0)">1. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(1)">2. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(2)">3. <span class="tx">-</span></button>
        <button class="btn" onclick="submitAnswer(3)">4. <span class="tx">-</span></button>
    </div>
</div>

<script>
    const socket = io();
    let currentRoom = "";
    let myHp = 100, peerHp = 100, curIdx = 0, lock = true;

    const db = [
    // [1] 선사 ~ 여러 나라의 성장 (20문제)
    {e:"선사", q:"뗀석기를 사용하고 동굴이나 막집에 거주한 시대는?", c:["구석기","신석기","청동기","철기"], a:0},
    {e:"선사", q:"가락바퀴와 뼈바늘로 옷을 지어 입기 시작한 시대는?", c:["구석기","신석기","청동기","철기"], a:1},
    {e:"선사", q:"빗살무늬 토기를 제작하고 농경과 정착 생활을 시작한 시대는?", c:["구석기","신석기","청동기","철기"], a:1},
    {e:"선사", q:"비파형 동검과 고인돌이 등장한 계급 사회는?", c:["구석기","신석기","청동기","철기"], a:2},
    {e:"선사", q:"반달 돌칼을 사용하여 곡물을 수확하던 시대는?", c:["신석기","청동기","철기","삼국시대"], a:1},
    {e:"선사", q:"주먹도끼 등 석기를 다듬는 기술에 따라 구분하는 시대는?", c:["구석기","신석기","청동기","철기"], a:0},
    {e:"선사", q:"애니미즘, 토테미즘 등 원시 신앙이 나타난 시대는?", c:["구석기","신석기","청동기","철기"], a:1},
    {e:"선사", q:"거푸집을 이용해 청동 방울이나 거울을 제작한 시대는?", c:["신석기","청동기","철기","삼국"], a:1},
    {e:"선사", q:"철제 농기구 사용으로 농업 생산력이 크게 증대된 시대는?", c:["청동기","철기","삼국","고려"], a:1},
    {e:"선사", q:"독무덤(옹관묘)과 널무덤이 주로 나타난 시대는?", c:["구석기","신석기","청동기","철기"], a:3},
    {e:"고조선", q:"우리나라 최초의 국가로 '홍익인간'의 이념을 세운 나라는?", c:["부여","고구려","고조선","옥저"], a:2},
    {e:"고조선", q:"사회 질서를 위해 만든 '8조법'이 있던 나라는?", c:["부여","고구려","고조선","삼한"], a:2},
    {e:"고조선", q:"고조선의 세력 범위를 알려주는 대표적 유물은?", c:["비파형 동검","세형 동검","칠지도","호우명 그릇"], a:0},
    {e:"고조선", q:"중국 진·한 교체기에 이주해와 왕위를 차지한 인물은?", c:["단군왕검","위만","주몽","온조"], a:1},
    {e:"부여", q:"영고라는 제천 행사를 열고 4출도를 다스린 나라는?", c:["부여","고구려","동예","옥저"], a:0},
    {e:"고구려", q:"서옥제 풍습과 '동맹'이라는 제천 행사가 있던 나라는?", c:["부여","고구려","옥저","삼한"], a:1},
    {e:"옥저", q:"가족 공동 무덤인 '골장제'와 '민며느리제'가 있던 나라는?", c:["부여","옥저","동예","삼한"], a:1},
    {e:"동예", q:"다른 부족의 경계를 침범하면 변상하는 '책화'가 있던 나라는?", c:["부여","고구려","옥저","동예"], a:3},
    {e:"삼한", q:"천군이 다스리는 신성 지역 '소도'가 존재한 나라는?", c:["옥저","동예","부여","삼한"], a:3},
    {e:"여러나라", q:"동예에서 단궁, 과하마, 반피 등이 특산물로 유명했던 나라는?", c:["부여","고구려","옥저","동예"], a:3},

    // [2] 삼국 ~ 남북국 시대 (20문제)
    {e:"고구려", q:"태학을 설립하고 율령을 반포하여 국가 기틀을 닦은 왕은?", c:["소수림왕","광개토대왕","장수왕","문자명왕"], a:0},
    {e:"고구려", q:"백제를 공격해 한강 유역을 차지하고 영토를 크게 넓힌 왕은?", c:["소수림왕","광개토대왕","장수왕","영양왕"], a:1},
    {e:"고구려", q:"평양으로 남진 정책을 추진하고 경당을 설치한 왕은?", c:["태조왕","고국천왕","장수왕","문자명왕"], a:2},
    {e:"고구려", q:"살수대첩에서 수나라의 대군을 물리친 장군은?", c:["을지문덕","연개소문","양만춘","계백"], a:0},
    {e:"백제", q:"요서 진출, 마한 정복 등 백제의 최대 전성기를 이끈 왕은?", c:["온조왕","고이왕","근초고왕","무령왕"], a:2},
    {e:"백제", q:"웅진으로 천도한 후 22담로를 설치해 지방을 통제한 왕은?", c:["성왕","개로왕","무령왕","의자왕"], a:2},
    {e:"백제", q:"사비로 천도하고 국호를 남부여로 고치며 중흥을 꾀한 왕은?", c:["무령왕","성왕","무왕","의자왕"], a:1},
    {e:"신라", q:"화랑도를 국가 조직으로 개편하고 한강을 차지한 왕은?", c:["지증왕","법흥왕","진흥왕","무열왕"], a:2},
    {e:"신라", q:"불교를 공인하고 병부를 설치하며 율령을 반포한 왕은?", c:["내물왕","지증왕","법흥왕","진흥왕"], a:2},
    {e:"신라", q:"국호를 신라로 확정하고 '왕'이라는 칭호를 처음 사용한 왕은?", c:["지증왕","법흥왕","진흥왕","무열왕"], a:0},
    {e:"신라", q:"매소성 전투와 기벌포 전투에서 당군을 물리치고 통일을 이룬 왕은?", c:["무열왕","문무왕","신문왕","성덕왕"], a:1},
    {e:"가야", q:"전기 가야 연맹의 맹주였으며 철 수출로 번성한 나라는?", c:["금관가야","대가야","성산가야","아라가야"], a:0},
    {e:"통일신라", q:"신문왕이 귀족의 경제 기반을 약화시키기 위해 지급한 것은?", c:["녹읍","식읍","관료전","정전"], a:2},
    {e:"통일신라", q:"완도에 청해진을 설치하고 해상 무역을 장악한 인물은?", c:["최치원","장보고","김유신","원효"], a:1},
    {e:"통일신라", q:"'해골 물' 일화로 유명하며 불교의 대중화에 힘쓴 승려는?", c:["의천","지눌","원효","의상"], a:2},
    {e:"통일신라", q:"당의 빈공과에 합격하고 '토황소격문'을 쓴 인물은?", c:["최치원","장보고","설총","김대성"], a:0},
    {e:"발해", q:"고구려 계승 의식을 가졌으며 '해동성국'이라 불린 나라는?", c:["발해","통일신라","후고구려","후백제"], a:0},
    {e:"발해", q:"발해를 건국하고 동모산 근처에 도읍을 정한 인물은?", c:["대조영","무왕","문왕","선왕"], a:0},
    {e:"발해", q:"당과 적대적이었으나 웅진도독부를 공격하며 세력을 넓힌 왕은?", c:["무왕","문왕","선왕","대조영"], a:0},
    {e:"통일신라", q:"민정문서(신라 부락 문서)가 발견된 곳은?", c:["경주","청주","공주","부여"], a:1},

    // [3] 고려 시대 (20문제)
    {e:"고려", q:"호족 세력을 견제하기 위해 과거제를 처음 실시한 왕은?", c:["태조","광종","성종","문종"], a:1},
    {e:"고려", q:"최승로의 시무 28조를 수용해 중앙 관제를 정비한 왕은?", c:["광종","성종","현종","숙종"], a:1},
    {e:"고려", q:"서희가 외교 담판을 통해 강동 6주를 획득한 상대 국가는?", c:["거란","여진","몽골","일본"], a:0},
    {e:"고려", q:"귀주 대첩에서 거란군을 크게 물리친 장군은?", c:["강감찬","윤관","서희","양규"], a:0},
    {e:"고려", q:"여진족을 정벌하기 위해 윤관이 조직한 특수 부대는?", c:["별기군","별무반","삼별초","신의군"], a:1},
    {e:"고려", q:"무신 정권기 최고 집권 기구로 최충헌이 설치한 것은?", c:["중추원","도병마사","교정도감","정방"], a:2},
    {e:"고려", q:"몽골 침략에 맞서 강화도에서 끝까지 항전한 부대는?", c:["야별초","삼별초","훈련도감","별무반"], a:1},
    {e:"고려", q:"쌍성총관부를 공격해 영토를 회복하고 변발을 금지한 왕은?", c:["충렬왕","충선왕","공민왕","우왕"], a:2},
    {e:"고려", q:"벽란도를 통해 아라비아 상인들과 교류하며 알려진 이름은?", c:["Corea","Chosun","Silla","Gaya"], a:0},
    {e:"고려", q:"화통도감을 설치해 화포로 진포 대첩을 승리로 이끈 인물은?", c:["최영","이성계","최무선","남이"], a:2},
    {e:"고려", q:"국자감을 국학으로 개편하고 양현고를 설치한 시대는?", c:["신라","고려","조선","발해"], a:1},
    {e:"고려", q:"문벌 귀족 사회의 동요를 보여주는 이자겸의 난이 일어난 왕은?", c:["인종","의종","명종","신종"], a:0},
    {e:"고려", q:"서경 천도와 금국 정벌을 주장하며 난을 일으킨 승려는?", c:["의천","지눌","묘청","보우"], a:2},
    {e:"고려", q:"처인성 전투에서 몽골의 장수 살리타를 사살한 인물은?", c:["김윤후","박서","배중손","최춘명"], a:0},
    {e:"고려", q:"직지심체요절이 간행된 곳은?", c:["해인사","불국사","흥덕사","수덕사"], a:2},
    {e:"고려", q:"원 간섭기 때 정동행성 이문소를 폐지한 왕은?", c:["공민왕","충선왕","충목왕","우왕"], a:0},
    {e:"고려", q:"불교 통합을 위해 천태종을 개창한 승려는?", c:["의천","지눌","요세","보우"], a:0},
    {e:"고려", q:"수선사 결사 운동을 전개하며 조계종을 발전시킨 승려는?", c:["의천","지눌","일연","원효"], a:1},
    {e:"고려", q:"신진 사대부의 경제적 기반이 된 토지 제도는?", c:["과전법","직전법","전시과","민전"], a:2},
    {e:"고려", q:"상감 청자가 가장 유행했던 시기는?", c:["고려 전기","고려 중기","고려 후기","원 간섭기"], a:1},

    // [4] 조선 시대 (20문제)
    {e:"조선", q:"6조 직계제를 실시하고 호패법을 시행하며 왕권을 강화한 왕은?", c:["태조","태종","세종","세조"], a:1},
    {e:"조선", q:"집현전을 설치하고 훈민정음을 창제한 왕은?", c:["세종","성종","중종","선조"], a:0},
    {e:"조선", q:"조선의 기본 법전인 '경국대전'을 완성하여 반포한 왕은?", c:["세종","세조","성종","연산군"], a:2},

    function joinRoom() {
        const room = document.getElementById('room-input').value.trim();
        if(!room) return alert("방 이름을 입력하세요.");
        currentRoom = room;
        socket.emit('join-room', room);
        document.getElementById('lobby-status').innerText = "상대방 접속을 기다리는 중...";
        document.getElementById('join-btn').disabled = true;
    }

    // [서버 신호] 게임 시작 시
    socket.on('game-start', () => {
        document.getElementById('lobby').style.display = 'none';
        // 방장(서버 기준 첫번째 소켓)이 문제를 선택해서 전파
        socket.emit('game-data', { roomId: currentRoom, type: 'req-next' });
    });

    // [서버 신호] 데이터 수신 통합 처리
    socket.on('peer-data', (data) => {
        const btns = document.querySelectorAll('.btn');
        const q = db[curIdx];

        if(data.type === 'next') {
            // 강제 다음 문제 이동
            curIdx = data.idx;
            renderQ();
        } 
        else if(data.type === 'result') {
            // 누군가 정답/오답을 눌렀을 때 연출 동기화
            lock = true; 
            if(data.isCorrect) {
                // 공격한 사람/받은 사람 구분하여 HP 차감
                if(data.sender === socket.id) {
                    btns[data.choiceIdx].classList.add('correct');
                    peerHp -= 10;
                } else {
                    btns[q.a].classList.add('correct');
                    myHp -= 10;
                    showHit();
                }
            } else {
                // 오답일 때 연출
                if(data.sender === socket.id) {
                    btns[data.choiceIdx].classList.add('wrong');
                    btns[q.a].classList.add('correct');
                    myHp -= 10;
                    showHit();
                } else {
                    // 상대가 틀렸을 때 나도 상대의 오답 연출을 봄
                    btns[data.choiceIdx].classList.add('wrong');
                    btns[q.a].classList.add('correct');
                    peerHp -= 10;
                }
            }
            updateUI();

            // 1.2초 뒤에 무조건 다음 문제 (방장이 대표로 요청)
            setTimeout(() => {
                if(myHp <= 0 || peerHp <= 0) {
                    alert(myHp <= 0 ? "패배!" : "승리!");
                    location.reload();
                } else {
                    // 서버에 새로운 문제를 요청 (중복 호출 방지를 위해 한 명만 요청해도 됨)
                    socket.emit('game-data', { roomId: currentRoom, type: 'req-next' });
                }
            }, 1200);
        }
    });

    function renderQ() {
        lock = false;
        const q = db[curIdx];
        document.getElementById('tag').innerText = q.e;
        document.getElementById('question').innerText = q.q;
        document.querySelectorAll('.btn').forEach((b, i) => {
            b.className = 'btn';
            b.querySelector('.tx').innerText = q.c[i];
        });
    }

    function submitAnswer(idx) {
        if(lock) return;
        lock = true; // 중복 클릭 방지
        const q = db[curIdx];
        const isCorrect = (idx === q.a);
        
        // 내가 누른 결과를 서버로 전송 (나와 상대 모두에게 전달됨)
        socket.emit('game-data', { 
            roomId: currentRoom, 
            type: 'result', 
            isCorrect: isCorrect,
            choiceIdx: idx,
            sender: socket.id
        });
    }

    function updateUI() {
        document.getElementById('my-hp-bar').style.width = myHp + "%";
        document.getElementById('peer-hp-bar').style.width = peerHp + "%";
        document.getElementById('my-hp-val').innerText = myHp;
        document.getElementById('peer-hp-val').innerText = peerHp;
    }

    function showHit() {
        document.getElementById('game-container').classList.add('hit-shake');
        setTimeout(() => document.getElementById('game-container').classList.remove('hit-shake'), 300);
        if(navigator.vibrate) navigator.vibrate(200);
    }
</script>
